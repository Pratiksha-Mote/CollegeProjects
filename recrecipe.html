<!DOCTYPE html>
<html lang="en">
<head>
    <title>Recipe - TestHub</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #fafafa;
        }

        /* Top Bar */
        .top-bar {
            background-color: #8b5e7e;
            color: #fff;
            text-align: center;
            padding: 5px 0;
            font-size: 20px;
        }

        .top-bar a {
            color: #fff;
            font-weight: bold;
            text-decoration: none;
            margin-left: 8px;
        }

        /* Header / Nav */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
            background-color: #fff;
            border-bottom: 1px solid #e0d4e0;
        }

        header h1 {
            font-family: 'Georgia', serif;
            font-size: 40px;
            color: #8b5e7e;
            margin: 0;
        }

        nav {
            display: flex;
            gap: 50px;
            font-weight: bold;
            font-size: 35px;
        }

        nav a {
            text-decoration: none;
            color: #333;
            transition: color 0.2s ease;
        }

        nav a:hover {
            color: #8b5e7e;
        }

        /* Recipe Page Content */
        h1 {
            text-align: center;
            margin: 30px 0;
            color: #333;
        }

        .flex {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
            width: 95%;
            margin: auto;
            padding: 15px;
        }

        .recipe-card {
            flex: 1 1 220px;
            max-width: 250px;
            border: 1px solid #ccc;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
            background: white;
            text-align: center;
            transition: transform 0.2s ease-in-out;
        }

        .recipe-card:hover {
            transform: scale(1.05);
        }

        .recipe-card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            display: block;
        }

        .recipe-card a {
            text-decoration: none;
            color: black;
            font-weight: bold;
            display: block;
            padding: 10px;
        }

        /* Footer */
        footer {
            text-align: center;
            background-color: #ff6f3c;
            color: white;
            padding: 10px;
            font-weight: bold;
            font-size: 16px;
            margin-top: 30px;
        }
    </style>

    <script>
        // Simulate registration/login status
        let isRegistered = false; // change to true after login/register

        // Function to handle recipe click
        function handleRecipeClick(event, url) {
            event.preventDefault();
            if (!isRegistered) {
                alert("Please register or log in to view the video!");
                window.location.href = "reclog.html"; // redirect to login/register page
            } else {
                window.open(url, "_blank");
            }
        }
    </script>
</head>
